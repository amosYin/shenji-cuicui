steps:
  - uses: actions/setup-node@v4
    with:
      node-version: '23'      # 建议改用 20 或 22（更稳定）
      cache: 'npm'

  - name: Install dependencies
    run: npm ci

  - name: Build project
    run: npm run build

  - name: Upload to OSS
    uses: aliyun/oss-website-action@v1
    with:
      accessKeyId: ${{ secrets.OSS_ACCESS_KEY_ID }}
      accessKeySecret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
      bucket: shenji-cuicui
      endpoint: oss-cn-hongkong.aliyuncs.com
      folder: dist
      # targetFolder: myapp   # 按需取消注释